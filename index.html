<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Portfolio Roblox</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Outfit", sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: url("sky1.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(20, 0, 40, 0.52);
            z-index: 0;
        }

        nav {
            position: fixed;
            top: 28px;
            display: flex;
            gap: 16px;
            z-index: 10;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 10px 26px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.22);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        nav a:hover {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.5);
            transform: translateY(-2px);
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .pseudo-container {
            text-align: center;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 30px 70px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            font-family: "Bebas Neue", sans-serif;
            font-size: 58px;
            letter-spacing: 6px;
            margin-bottom: 50px;
            text-shadow: 0 0 40px rgba(200,150,255,0.6);
        }

        .assets-grid {
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 900px;
        }

        .asset-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 32px 28px;
            width: 200px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .asset-card:hover {
            transform: translateY(-6px);
            background: rgba(255,255,255,0.15);
            border-color: rgba(200,150,255,0.6);
            box-shadow: 0 8px 32px rgba(160,80,255,0.25);
        }

        .asset-card .icon { font-size: 36px; margin-bottom: 12px; display: block; }

        .asset-card h3 {
            font-family: "Bebas Neue", sans-serif;
            font-size: 22px;
            letter-spacing: 3px;
            margin-bottom: 6px;
        }

        .asset-card p {
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,0,25,0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 36px;
            border-radius: 20px;
            max-width: 90%;
            max-height: 88vh;
            overflow-y: auto;
            text-align: center;
        }

        .modal h2 {
            font-family: "Bebas Neue", sans-serif;
            font-size: 32px;
            letter-spacing: 4px;
            margin-bottom: 24px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }

        .gallery img {
            width: 100%;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.15);
            transition: transform 0.2s;
        }

        .gallery img:hover { transform: scale(1.02); }

        .close-btn {
            background: rgba(255,255,255,0.12);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 28px;
            border-radius: 50px;
            cursor: pointer;
            font-family: "Outfit", sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .close-btn:hover { background: rgba(255,255,255,0.22); }
    </style>
</head>
<body>

    <nav>
        <a href="#">HOME</a>
        <a href="#">PORTFOLIO</a>
    </nav>

    <div class="content">

        <!-- ✏️ REMPLACE "TON_PSEUDO" PAR TON VRAI PSEUDO ROBLOX -->
        <div class="pseudo-container">TON_PSEUDO</div>

        <div class="assets-grid">

            <!-- CARTE FLOWERS -->
            <div class="asset-card" onclick="openModal('flowers-modal')">
                <span class="icon">🌸</span>
                <h3>FLOWERS</h3>
                <p>Roblox 3D Assets</p>
            </div>

            <!-- 👇 COPIE CE BLOC POUR AJOUTER UNE NOUVELLE CATÉGORIE
            <div class="asset-card" onclick="openModal('epees-modal')">
                <span class="icon">⚔️</span>
                <h3>EPEES</h3>
                <p>Roblox 3D Assets</p>
            </div>
            -->

        </div>
    </div>

    <!-- POP-UP FLOWERS -->
    <div id="flowers-modal" class="modal">
        <div class="modal-content">
            <h2>🌸 Mes Créations de Fleurs</h2>
            <div class="gallery">
                <!-- ✏️ REMPLACE LES LIENS src="..." PAR TES VRAIES IMAGES -->
                <img src="fleur1.png" alt="Fleur Roblox">
                <img src="fleur2.png" alt="Fleur Roblox">
            </div>
            <button class="close-btn" onclick="closeModal('flowers-modal')">Fermer</button>
        </div>
    </div>

    <!-- 👇 COPIE CE BLOC POUR AJOUTER UNE NOUVELLE POP-UP
    <div id="epees-modal" class="modal">
        <div class="modal-content">
            <h2>⚔️ Mes Épées</h2>
            <div class="gallery">
                <img src="epee1.png" alt="Épée Roblox">
            </div>
            <button class="close-btn" onclick="closeModal('epees-modal')">Fermer</button>
        </div>
    </div>
    -->

    <script>
        function openModal(id) { document.getElementById(id).style.display = "flex"; }
        function closeModal(id) { document.getElementById(id).style.display = "none"; }
        window.addEventListener("click", function(e) {
            if (e.target.classList.contains("modal")) e.target.style.display = "none";
        });
    </script>

</body>
</html>
